<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetMate — Leaderboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* NAV */
        nav {
            background: #111111;
            border-bottom: 1px solid #1f1f1f;
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            font-family: 'JetBrains Mono', monospace;
            font-size: 17px;
            color: #555;
            text-decoration: none;
            font-weight: 500;
        }

        .nav-brand span { color: #22c55e; }

        .nav-links { display: flex; align-items: center; gap: 24px; }

        .nav-links a {
            font-size: 15px;
            color: #555;
            font-weight: 500;
            border: solid 1px #16a34a;
            border-radius: 8px;
            padding: 5px 12px;
            text-decoration: none;
        }

        .nav-links a:hover { color: #e0e0e0; }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #888;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            background: #1a2e1a;
            border: 1px solid #22c55e;
            color: #22c55e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 13px;
        }

        .btn-logout {
            background: none;
            border: 1px solid #1f1f1f;
            color: #7d7c7c;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .btn-logout:hover { border-color: #ef4444; color: #ef4444; }

        /* MAIN */
        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 24px 80px;
        }

        /* PAGE HEADER */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            font-weight: 700;
            color: #e0e0e0;
        }

        /* FILTER BUTTONS */
        .filters {
            display: flex;
            gap: 6px;
        }

        .filter-btn {
            padding: 6px 14px;
            background: #111;
            border: 1px solid #1f1f1f;
            border-radius: 6px;
            color: #b1abab;
            font-size: 12.5px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .filter-btn.active {
            background: #0fc753;
            border-color: #22c55e;
            color: #0a0a0a;
        }

        /* TABLE */
        .table-wrap {
            background: #111111;
            border: 1px solid #757575;
            border-radius: 12px;
            overflow: hidden;
        }

        .lb-header-row {
            display: grid;
            grid-template-columns: 48px 1fr 70px 80px 60px 70px 60px 100px;
            padding: 11px 18px;
            border-bottom: 1px solid #1a1a1a;
            gap: 8px;
        }

        .lb-header-row span {
            font-size: 10.5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #b1abab;
        }

        .lb-row {
            display: grid;
            grid-template-columns: 48px 1fr 70px 80px 60px 70px 60px 100px;
            padding: 13px 18px;
            border-bottom: 1px solid #1b1b1b;
            gap: 8px;
            align-items: center;
        }

        .lb-row:last-child { border-bottom: none; }

        .lb-row.is-me {
            background: #0d1a0d;
            border-left: 2px solid #22c55e;
        }

        .rank-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            color: #333;
        }

        .lb-row.is-me .rank-num { color: #22c55e; }

        .rank-num.top1 { color: #22c55e; }
        .rank-num.top2 { color: #4ade80; }
        .rank-num.top3 { color: #555; }

        .lb-name {
            font-size: 13.5px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .lb-row.is-me .lb-name { color: #22c55e; }

        .lb-branch {
            font-size: 11px;
            color: #444;
            background: #1a1a1a;
            padding: 2px 7px;
            border-radius: 4px;
            text-align: center;
            font-weight: 600;
        }

        .lb-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13.5px;
            font-weight: 700;
            text-align: right;
        }

        .lb-total { color: #22c55e; }
        .lb-easy { color: #57de89; }
        .lb-medium { color: #ffae00; }
        .lb-hard { color: #e62525; }

        .gap-pill {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11.5px;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 5px;
            text-align: center;
        }

        .gap-pill.me { background: #1a2e1a; color: #22c55e; border: 1px solid #22c55e; }
        .gap-pill.ahead { background: #0a1a0a; color: #4ade80; border: 1px solid #103a10; }
        .gap-pill.behind { background: #1a1a1a; color: #444; border: 1px solid #2a2a2a; }

        .empty-state {
            padding: 48px;
            text-align: center;
            color: #333;
            font-size: 13.5px;
        }

        @media (max-width: 700px) {
            .lb-header-row,
            .lb-row {
                grid-template-columns: 40px 1fr 60px 70px 90px;
            }
            .lb-easy, .lb-medium, .lb-hard,
            .lb-header-row span:nth-child(5),
            .lb-header-row span:nth-child(6),
            .lb-header-row span:nth-child(7) {
                display: none;
            }
            nav { padding: 14px 16px; }
            .main { padding: 20px 16px 60px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">leet<span>mate</span></div>
    <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
    </div>
    <div class="nav-user">
        <div class="avatar" id="nav-avatar">?</div>
        <span id="nav-username"></span>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="main">
    <div class="page-header">
        <div class="page-title">Leaderboard</div>
        <div class="filters">
            <button class="filter-btn active" onclick="filterBranch('ALL', this)">All</button>
            <button class="filter-btn" onclick="filterBranch('CSE', this)">CSE</button>
            <button class="filter-btn" onclick="filterBranch('IT', this)">IT</button>
            <button class="filter-btn" onclick="filterBranch('ECE', this)">ECE</button>
        </div>
    </div>

    <div class="table-wrap">
        <div class="lb-header-row">
            <span>#</span>
            <span>Student</span>
            <span>Branch</span>
            <span style="text-align:right">Total</span>
            <span style="text-align:right">Easy</span>
            <span style="text-align:right">Medium</span>
            <span style="text-align:right">Hard</span>
            <span style="text-align:right">vs you</span>
        </div>
        <div id="lb-body">
            <div class="empty-state">Loading leaderboard...</div>
        </div>
    </div>
    <div class="foot" style="padding-top:32px; font-size: 14px; color: #6d6c6c; text-align: center;">Found Leetmate impressive!, Rate it on  <a href="https://github.com/hardeepbuilds/leetmate" target="_blank" style="text-decoration: none; color: #22c55e; ">
      <svg xmlns="http://www.w3.org/2000/svg"
         width="32"
         height="32"
         viewBox="0 0 50 50"
         fill="currentColor">
        <path d="M17.791,46.836C18.502,46.53,19,45.823,19,45v-5.4c0-0.197,0.016-0.402,0.041-0.61C19.027,38.994,19.014,38.997,19,39c0,0-3,0-3.6,0c-1.5,0-2.8-0.6-3.4-1.8c-0.7-1.3-1-3.5-2.8-4.7C8.9,32.3,9.1,32,9.7,32c0.6,0.1,1.9,0.9,2.7,2c0.9,1.1,1.8,2,3.4,2c2.487,0,3.82-0.125,4.622-0.555C21.356,34.056,22.649,33,24,33v-0.025c-5.668-0.182-9.289-2.066-10.975-4.975c-3.665,0.042-6.856,0.405-8.677,0.707c-0.058-0.327-0.108-0.656-0.151-0.987c1.797-0.296,4.843-0.647,8.345-0.714c-0.112-0.276-0.209-0.559-0.291-0.849c-3.511-0.178-6.541-0.039-8.187,0.097c-0.02-0.332-0.047-0.663-0.051-0.999c1.649-0.135,4.597-0.27,8.018-0.111c-0.079-0.5-0.13-1.011-0.13-1.543c0-1.7,0.6-3.5,1.7-5c-0.5-1.7-1.2-5.3,0.2-6.6c2.7,0,4.6,1.3,5.5,2.1C21,13.4,22.9,13,25,13s4,0.4,5.6,1.1c0.9-0.8,2.8-2.1,5.5-2.1c1.5,1.4,0.7,5,0.2,6.6c1.1,1.5,1.7,3.2,1.6,5c0,0.484-0.045,0.951-0.11,1.409c3.499-0.172,6.527-0.034,8.204,0.102c-0.002,0.337-0.033,0.666-0.051,0.999c-1.671-0.138-4.775-0.28-8.359-0.089c-0.089,0.336-0.197,0.663-0.325,0.98c3.546,0.046,6.665,0.389,8.548,0.689c-0.043,0.332-0.093,0.661-0.151,0.987c-1.912-0.306-5.171-0.664-8.879-0.682C35.112,30.873,31.557,32.75,26,32.969V33c2.6,0,5,3.9,5,6.6V45c0,0.823,0.498,1.53,1.209,1.836C41.37,43.804,48,35.164,48,25C48,12.318,37.683,2,25,2S2,12.318,2,25C2,35.164,8.63,43.804,17.791,46.836z"/>
    </svg>
    </a> 
    
    <div class="foot" style="padding-top:32px; font-size: 14px; color: #6d6c6c; text-align: center;">TO KNOW MORE ABOUT THE LEETMATE, <a href="leetmate documentation.html" target="_blank" style="text-decoration: none; color: #22c55e; ">CLICK HERE</a></div>
</div>

<script>
    const BASE_URL = "https://leetmate.onrender.com"
    const token = sessionStorage.getItem("token")
    if (!token) window.location.href = "index.html"

    let allRows = []
    let myUsername = ""
    let myTotal = 0

    async function authFetch(endpoint) {
        return await fetch(`${BASE_URL}${endpoint}`, {
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            }
        })
    }

    async function loadLeaderboard() {
        const meRes = await authFetch("/me")
        const meData = await meRes.json()
        if (!meRes.ok) { window.location.href = "login.html"; return }

        myUsername = meData.username
        myTotal = meData.total_solved
        document.getElementById("nav-username").textContent = myUsername
        document.getElementById("nav-avatar").textContent = myUsername.charAt(0).toUpperCase()

        const lbRes = await authFetch("/leaderboard")
        allRows = await lbRes.json()
        renderTable(allRows)
    }

    function renderTable(rows) {
        const body = document.getElementById("lb-body")
        if (!rows.length) {
            body.innerHTML = `<div class="empty-state">No data yet.</div>`
            return
        }

        body.innerHTML = rows.map((row, index) => {
            const isMe = row.username === myUsername
            const gap = row.total_solved - myTotal

            let rankClass = ""
            if (index === 0) rankClass = "top1"
            else if (index === 1) rankClass = "top2"
            else if (index === 2) rankClass = "top3"

            let pillClass = isMe ? "me" : gap > 0 ? "ahead" : "behind"
            let pillText = isMe
                ? "you"
                : gap > 0
                ? `+${gap}`
                : `${Math.abs(gap)}`

            return `
                <div class="lb-row ${isMe ? "is-me" : ""}">
                    <div class="rank-num ${rankClass}">${index + 1}</div>
                    <div class="lb-name">${row.username}</div>
                    <div class="lb-branch">${row.branch}</div>
                    <div class="lb-num lb-total">${row.total_solved}</div>
                    <div class="lb-num lb-easy">${row.easy}</div>
                    <div class="lb-num lb-medium">${row.medium}</div>
                    <div class="lb-num lb-hard">${row.hard}</div>
                    <div class="gap-pill ${pillClass}">${pillText}</div>
                </div>
            `
        }).join("")
    }

    function filterBranch(branch, btn) {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"))
        btn.classList.add("active")

        const filtered = branch === "ALL"
            ? allRows
            : allRows.filter(r => r.branch.toUpperCase() === branch.toUpperCase())

        const reranked = filtered.map((r, i) => ({...r, rank: i + 1}))
        renderTable(reranked)
    }

    function logout() {
        sessionStorage.removeItem("token")
        window.location.href = "login.html"
    }

    loadLeaderboard()
</script>
</body>
</html>
